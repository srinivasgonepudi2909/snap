version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: snapdocs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: snapdocs_db
      POSTGRES_USER: snapdocs_user
      POSTGRES_PASSWORD: snapdocs_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - snapdocs-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snapdocs_user -d snapdocs_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: snapdocs-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://snapdocs_user:snapdocs_password@postgres:5432/snapdocs_db
      SECRET_KEY: snapdocs-jwt-secret-key-change-in-production-2024
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - snapdocs-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  snapdocs-network:
    driver: bridge
