version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: snapdocs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: snapdocs_db
      POSTGRES_USER: snapdocs_user
      POSTGRES_PASSWORD: snapdocs_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - snapdocs-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snapdocs_user -d snapdocs_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: snapdocs-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://snapdocs_user:snapdocs_password@postgres:5432/snapdocs_db
      SECRET_KEY: snapdocs-jwt-secret-key-change-in-production-2024
      DEBUG: "true"
      API_V1_STR: /api/v1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    networks:
      - snapdocs-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: snapdocs-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - snapdocs-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: snapdocs-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./shared/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    networks:
      - snapdocs-network

volumes:
  postgres_data:
    driver: local
  backend_logs:
    driver: local

networks:
  snapdocs-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
